        <div class="settings-layout">
            <nav class="sidebar" id="sidebar">

                <div class="menu-item" onclick="showSelection('appearance')"> Внешний вид</div>
                <div class="menu-item" onclick="showSelection('SearchSystem')"> Поисковая система</div>
                <div class="menu-item" onclick="showSelection('default')"> Браузер по умолчанию</div>
                <div class="menu-item" onclick="showSelection('language')"> Язык</div>
            </nav>
        </div>

        <div class="content" id="content-area">
            <h1 id="section-title">Выберите раздел</h1>
            <div id="section-content">Здесь появятся настройки</div>
        </div>
